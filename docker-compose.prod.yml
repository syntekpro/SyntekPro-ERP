name: ${COMPOSE_PROJECT_NAME:-erp}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - internal

  web:
    image: nginx:1.27-alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    ports:
      - "127.0.0.1:${WEB_HTTP_PORT:-8082}:80"
    networks:
      - internal
      - erp-net

  db:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-erp_demo}
      MYSQL_USER: ${DB_USERNAME:-erp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-erp}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - erp-db:/var/lib/mysql
    networks:
      - internal

  redis:
    image: redis:7-alpine
    volumes:
      - erp-redis:/data
    networks:
      - internal

volumes:
  erp-db:
  erp-redis:

networks:
  internal:
    driver: bridge
  erp-net:
    external: true
    name: erp-net
