services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - internal

  web:
    image: nginx:1.27-alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    expose:
      - "80"
    networks:
      - internal
      - syntekpro-net

  db:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-syntekpro_demo}
      MYSQL_USER: ${DB_USERNAME:-syntekpro}
      MYSQL_PASSWORD: ${DB_PASSWORD:-syntekpro}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - syntekpro-db:/var/lib/mysql
    networks:
      - internal

  redis:
    image: redis:7-alpine
    volumes:
      - syntekpro-redis:/data
    networks:
      - internal

volumes:
  syntekpro-db:
  syntekpro-redis:

networks:
  internal:
    driver: bridge
  syntekpro-net:
    external: true
    name: syntekpro-net
